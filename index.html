
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inheritance Share Calculator</title>
<style>
:root{
  --bg:#f4f7fb; --card:#fff; --text:#07173d; --muted:#64748b; --border:#dbe4ef; --navy:#071b4d;
  --nisa:#8a16d8; --nisaSoft:#fbf2ff;
  --ms:#f59e0b; --msSoft:#fff7e8;
  --fgc:#238323; --fgcSoft:#eef9f0;
  --son:#1267d8; --sonSoft:#eef6ff;
  --daughter:#ec2b7a; --daughterSoft:#fff0f6;
  --zauj:#095acb; --zaujSoft:#eef5ff;
  --sectionHeader:#64748b;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:Arial,Helvetica,sans-serif;color:var(--text)}
.app{max-width:1320px;margin:18px auto;padding:0 14px;display:grid;grid-template-columns:315px 1fr;gap:18px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 8px 24px rgba(15,23,42,.07)}
.brand{padding:20px}.brand h1{margin:0 0 8px;color:var(--navy);font-size:27px;line-height:1.08}.brand p{margin:0;color:#40506f;line-height:1.35}
.panel{margin-top:14px;padding:16px}.panel h2,.main h2{margin:0 0 13px;color:var(--navy);font-size:16px}
.field{display:grid;grid-template-columns:1fr 92px;gap:10px;align-items:center;margin:10px 0}.field label{font-weight:800;font-size:14px}
input,select{height:38px;border:1px solid #ccd6e4;border-radius:9px;padding:0 10px;font-size:15px;background:#fff}
.hidden{display:none!important}.buttonRow{display:flex;gap:10px;margin-top:16px}
button{flex:1;border:0;height:43px;border-radius:9px;background:#075ce6;color:#fff;font-weight:900;cursor:pointer}button.secondary{background:#64748b}
.main{padding:16px}.visual{display:flex;flex-direction:column;gap:18px}
.group{border:2px solid var(--c);background:var(--soft);border-radius:18px;padding:16px}
.groupHeader{width:min(560px,62%);margin:0 auto 14px;background:var(--sectionHeader);color:#fff;text-align:center;font-weight:900;font-size:18px;padding:10px 16px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.summary{background:var(--c);color:#fff;border-radius:12px;padding:13px;text-align:center;font-weight:900;margin-bottom:10px}
.summary .title{font-size:20px}.summary .meta{font-size:15px;margin-top:4px}
.people{display:grid;gap:0;border-radius:12px;overflow:hidden}
.person{background:var(--c);color:#fff;min-height:100px;padding:12px 8px;border-right:2px solid rgba(255,255,255,.9);border-top:2px solid rgba(255,255,255,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;font-weight:800}
.person:last-child{border-right:0}.person .name{font-size:17px;font-weight:900;white-space:nowrap}.person .share{font-size:14px;white-space:nowrap}.person .amount{font-size:16px;font-weight:900;white-space:nowrap}
.subgroup{border:2px solid var(--c);border-radius:14px;overflow:hidden;background:#fff;margin-top:12px}
.childrenGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.leftoverBox{border:2px solid var(--sectionHeader);background:#f8fafc;border-radius:18px;padding:16px;text-align:center}
.leftoverBox .leftoverTitle{background:var(--sectionHeader);color:#fff;width:min(560px,62%);margin:0 auto 12px;padding:10px 16px;border-radius:10px;font-weight:900;font-size:18px}
.leftoverBox .leftoverMeta{color:var(--navy);font-weight:900;font-size:17px;line-height:1.45}
.empty{padding:28px;text-align:center;background:#f8fafc;border:1px dashed #cbd5e1;color:#475569;font-weight:900;border-radius:12px}
.tableWrap{margin-top:18px;overflow:auto}table{width:100%;border-collapse:collapse;background:#fff;font-size:14px}th{background:var(--navy);color:#fff;padding:9px;text-align:left}td{border:1px solid #d9dfeb;padding:8px}tfoot td{font-weight:900;background:#fff4c7}
.status{margin-top:12px;padding:13px;border-radius:9px;text-align:center;font-weight:900}.author{margin-top:18px;text-align:center;color:var(--muted);font-size:13px;font-weight:700}
@media(max-width:950px){.app{grid-template-columns:1fr}}@media(max-width:720px){.childrenGrid{grid-template-columns:1fr}.groupHeader{width:100%;font-size:16px}.people{grid-template-columns:1fr!important}}
</style>
</head>
<body>
<div class="app">
  <aside>
    <div class="card brand"><h1>Inheritance<br>Share Calculator</h1><p>Clean grouped layout with visual and numerical shares.</p></div>
    <div class="card panel">
      <h2>Inputs</h2>
      <div class="field"><label>Total Amount ($)</label><input id="total" type="number" min="0" value="120000"></div>
      <div class="field"><label>Deceased</label><select id="sex"><option selected>Male</option><option>Female</option></select></div>
      <div class="field"><label id="nisaLabel">Nisa (0–4)</label><input id="nisa" type="number" min="0" max="4" value="0"></div>
      <div class="field" id="wifeRow"><label>Wife/Zaujah</label><input id="wife" type="number" min="0" max="1" value="1"></div>
      <div class="field hidden" id="husbandRow"><label>Husband/Zauj</label><input id="husband" type="number" min="0" max="1" value="0"></div>
      <div class="field"><label>Father</label><input id="father" type="number" min="0" max="1" value="1"></div>
      <div class="field"><label>Grandfather</label><input id="grandfather" type="number" min="0" max="1" value="0"></div>
      <div class="field"><label>Sons</label><input id="sons" type="number" min="0" max="5" value="0"></div>
      <div class="field"><label>Daughters</label><input id="daughters" type="number" min="0" max="5" value="3"></div>
      <div class="field"><label>Mother</label><input id="mother" type="number" min="0" max="1" value="1"></div>
      <div class="field"><label>Brothers</label><input id="brothers" type="number" min="0" max="5" value="0"></div>
      <div class="field"><label>Sisters</label><input id="sisters" type="number" min="0" max="5" value="0"></div>
      <div class="buttonRow"><button type="button" id="calcBtn">Calculate</button><button type="button" class="secondary" id="resetBtn">Reset</button></div>
    </div>
  </aside>
  <main class="card main">
    <h2>Visual Share</h2><div id="visual" class="visual"></div>
    <div class="tableWrap"><h2>Numerical Result</h2><table><thead><tr><th>Category / Person</th><th>Fraction</th><th>% of Total</th><th>Amount ($)</th><th>Note</th></tr></thead><tbody id="tbody"></tbody><tfoot><tr><td>Total</td><td>1/1</td><td id="totalPct"></td><td id="totalAmt"></td><td>Total displayed</td></tr></tfoot></table></div>
    <div id="status" class="status"></div><div class="author">Author: <strong>Muneeb Rao</strong></div>
  </main>
</div>
<script>
const $=id=>document.getElementById(id);
const C={nisa:"#8a16d8",nisaSoft:"#fbf2ff",ms:"#f59e0b",msSoft:"#fff7e8",fgc:"#238323",fgcSoft:"#eef9f0",son:"#1267d8",sonSoft:"#eef6ff",daughter:"#ec2b7a",daughterSoft:"#fff0f6",zauj:"#095acb",zaujSoft:"#eef5ff"};
function money(n){return "$"+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
function pct(n){return (Number(n||0)*100).toFixed(2)+"%"}
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){let t=b;b=a%b;a=t}return a||1}
function frac(x){x=Number(x||0);if(Math.abs(x)<1e-10)return"0";let den=108000,num=Math.round(x*den),g=gcd(num,den);return `${num/g}/${den/g}`}
function val(id){return Math.max(0,parseInt($(id).value||"0",10))}
function sync(){let f=$("sex").value==="Female",max=f?2:4;$("nisa").max=max;$("nisaLabel").textContent=f?"Nisa (0–2)":"Nisa (0–4)";$("wifeRow").classList.toggle("hidden",f);$("husbandRow").classList.toggle("hidden",!f);if(f)$("wife").value=0;else $("husband").value=0}
function clamp(){sync();let f=$("sex").value==="Female",lim={nisa:f?2:4,wife:1,husband:1,father:1,grandfather:1,sons:5,daughters:5,mother:1,brothers:5,sisters:5};for(let [id,m] of Object.entries(lim)){let v=val(id);if(v>m)v=m;$(id).value=v}if(f)$("wife").value=0;else $("husband").value=0}
function addAmt(rows,name,amt,total,note){let sh=total?amt/total:0;rows.push({name,frac:frac(sh),share:sh,amt,note})}
function addShare(rows,name,share,total,note){rows.push({name,frac:frac(share),share,amt:share*total,note})}
function calc(){
  clamp();
  const total=Number($("total").value||0),nisa=val("nisa"),wife=val("wife"),husband=val("husband"),father=val("father"),grandfather=val("grandfather"),sons=val("sons"),daughters=val("daughters"),mother=val("mother"),brothers=val("brothers"),sisters=val("sisters");
  const hasChildren=sons+daughters>0,hasSiblings=brothers+sisters>0;let rows=[];
  const wifeShare=wife?(hasChildren?1/8:1/4):0, husbandShare=husband?(hasChildren?1/4:1/2):0;
  const wifeAmount=wifeShare*total, husbandAmount=husbandShare*total;

  let nisaRate=0;if(nisa===1)nisaRate=1/2;if(nisa===2)nisaRate=1/2;if(nisa===3||nisa===4)nisaRate=2/3;
  const nisaBase=wifeAmount>0?(total-wifeAmount):total;
  const nisaAmount=nisaRate*nisaBase;

  if(nisa>0){
    addAmt(rows,"Nisa (All)",nisaAmount,total,wifeAmount>0?"Total Nisa share calculated from TotalAmount minus Wife share":"Total Nisa share");
    let each=nisaAmount/nisa;
    for(let i=1;i<=nisa;i++)addAmt(rows,`Nisa ${i}`,each,total,wifeAmount>0?"Individual Nisa share calculated from TotalAmount minus Wife share":"Individual Nisa share");
  }

  const leftoverAfterZauj=total-wifeAmount-husbandAmount;
  const leftover=leftoverAfterZauj-nisaAmount;
  let msPool=(mother||hasSiblings)?leftover/3:0, fgcPool=leftover-msPool;
  if(father+grandfather+sons+daughters===0&&msPool>0){msPool=leftover;fgcPool=0}
  if(mother+brothers+sisters===0&&fgcPool>0){fgcPool=leftover;msPool=0}
  if(mother){let mAmt=hasSiblings?leftover/6:msPool;addAmt(rows,"Mother",mAmt,total,hasSiblings?"Mother gets 1/6 of LeftOverAmount":"Mother receives Mother + Siblings portion");let sp=msPool-mAmt,sc=brothers+sisters;if(sc>0){let each=sp/sc;for(let i=1;i<=brothers;i++)addAmt(rows,`Brother ${i}`,each,total,"Siblings share equally");for(let i=1;i<=sisters;i++)addAmt(rows,`Sister ${i}`,each,total,"Siblings share equally")}}
  else if(hasSiblings){let each=msPool/(brothers+sisters);for(let i=1;i<=brothers;i++)addAmt(rows,`Brother ${i}`,each,total,"Mother absent; siblings share Mother + Siblings portion");for(let i=1;i<=sisters;i++)addAmt(rows,`Sister ${i}`,each,total,"Mother absent; siblings share Mother + Siblings portion")}
  let fixed=0;if(hasChildren){if(father){let a=leftover/6;fixed+=a;addAmt(rows,"Father",a,total,"Child present → 1/6 of LeftOverAmount")}if(grandfather){let a=leftover/6;fixed+=a;addAmt(rows,"Grandfather",a,total,"Child present → 1/6 of LeftOverAmount")}let childAmt=Math.max(0,fgcPool-fixed),units=sons*2+daughters;if(units>0){let u=childAmt/units;for(let i=1;i<=sons;i++)addAmt(rows,`Son ${i}`,u*2,total,"Son share = 2 × daughter share");for(let i=1;i<=daughters;i++)addAmt(rows,`Daughter ${i}`,u,total,"Daughter share")}}
  else{let count=father+grandfather;if(count>0){let each=fgcPool/count;if(father)addAmt(rows,"Father",each,total,"No children; shares Father + Grandfather portion");if(grandfather)addAmt(rows,"Grandfather",each,total,"No children; shares Father + Grandfather portion")}}
  if(wife)addShare(rows,"Wife (Zaujah)",wifeShare,total,hasChildren?"Children present → 1/8":"No children → 1/4");
  if(husband)addShare(rows,"Husband (Zauj)",husbandShare,total,hasChildren?"Children present → 1/4":"No children → 1/2");
  const present=nisa+wife+husband+father+grandfather+sons+daughters+mother+brothers+sisters;
  if(present===1){let only=rows.find(r=>!r.name.includes("(All)"));if(only)rows=[{name:only.name,frac:"1/1",share:1,amt:total,note:"Only person present → receives 100% of TotalAmount"}]}
  if(present>1&&nisa>0){let assigned=rows.filter(r=>!r.name.includes("(All)")).reduce((s,r)=>s+r.amt,0),res=total-assigned;if(res>0.009){let each=res/nisa;for(let i=1;i<=nisa;i++){let r=rows.find(x=>x.name===`Nisa ${i}`);if(r){r.amt+=each;r.share=total?r.amt/total:0;r.frac=frac(r.share);r.note="Original Nisa share + equal share of remaining unassigned amount"}}let g=rows.find(x=>x.name==="Nisa (All)");if(g){let nr=rows.filter(x=>x.name.startsWith("Nisa ")&&!x.name.includes("(All)"));g.amt=nr.reduce((s,x)=>s+x.amt,0);g.share=total?g.amt/total:0;g.frac=frac(g.share);g.note="Total Nisa share after receiving remaining unassigned amount"}}}
  return {total,rows,nisa,wife,husband,father,grandfather,sons,daughters,mother,brothers,sisters,leftoverAfterZauj,leftover}
}
function sum(rows){return rows.reduce((s,r)=>s+r.amt,0)}
function group(cls,title,color,soft,inner){return `<section class="group ${cls}" style="--c:${color};--soft:${soft}"><div class="groupHeader">${title}</div>${inner}</section>`}
function summary(title,rows,color,total,leftover=0,showLeftOver=false){
  let amount=sum(rows),sh=total?amount/total:0;
  let meta=`${frac(sh)} = ${pct(sh)} of Total • ${money(amount)}`;
  if(showLeftOver && leftover && Math.abs(leftover-total)>0.01){
    let lo = amount/leftover;

    if(Math.abs(lo-sh)>0.0001 && Math.abs(lo-1)>0.0001){
        meta += `<br>${frac(lo)} = ${pct(lo)} of Left Over`;
    }
}
  return `<div class="summary" style="--c:${color};background:${color}"><div class="title">${title}</div><div class="meta">${meta}</div></div>`;
}
function isLeftOverPerson(name){
  return name==="Mother"||
         name==="Father"||
         name==="Grandfather"||
         name.startsWith("Son ")||
         name.startsWith("Daughter ")||
         name.startsWith("Brother ")||
         name.startsWith("Sister ");
}

function card(r,color,d=null){
  let extra="";
  if(d && isLeftOverPerson(r.name) && d.leftover && Math.abs(d.leftover)>0.01){
    let loShare=r.amt/d.leftover;
    extra=`<div class="share">${frac(loShare)} = ${pct(loShare)} of Left Over</div>`;
  }
  return `<div class="person" style="--c:${color};background:${color}"><div class="name">${r.name}</div><div class="share">${r.frac} = ${pct(r.share)} of Total</div>${extra}<div class="amount">${money(r.amt)}</div></div>`;
}
function empty(name,color){return `<div class="person" style="--c:${color};background:${color}"><div class="name">${name}</div><div class="share">0 = 0.00%</div><div class="amount">$0.00</div></div>`}
function leftoverBlock(title,amount,total){
  let sh=total?amount/total:0;
  return `<section class="leftoverBox"><div class="leftoverTitle">${title}</div><div class="leftoverMeta">${frac(sh)} = ${pct(sh)} of Total • ${money(amount)}</div></section>`;
}
function renderVisual(d){
  let html="", nisaRows=d.rows.filter(r=>r.name.startsWith("Nisa ")&&!r.name.includes("(All)"));

  let z=d.rows.find(r=>r.name.includes("Zauj"));
  if(z){
    let inner=`<div class="summary" style="background:${C.zauj};margin-bottom:0"><div class="title">${z.name}</div><div class="meta">${z.frac} = ${pct(z.share)} • ${money(z.amt)}</div></div>`;
    html+=group("gZauj","Zauj Group",C.zauj,C.zaujSoft,inner);
    html+=leftoverBlock("Left Over After Zauj Share",d.leftoverAfterZauj,d.total);
  }

  if(nisaRows.length){
    let nisaAmount=sum(nisaRows);
    let totalShare=d.total?nisaAmount/d.total:0;
    let lo1Share=d.leftoverAfterZauj?nisaAmount/d.leftoverAfterZauj:0;
    let nisaMeta=`${frac(totalShare)} = ${pct(totalShare)} of Total`;
    if(d.leftoverAfterZauj>0 && Math.abs(d.leftoverAfterZauj-d.total)>0.01){
      nisaMeta+=`<br>${frac(lo1Share)} = ${pct(lo1Share)} of Left Over 1 • ${money(nisaAmount)}`;
    }else{
      nisaMeta+=` • ${money(nisaAmount)}`;
    }
    let inner=`<div class="summary" style="--c:${C.nisa};background:${C.nisa}"><div class="title">Nisa</div><div class="meta">${nisaMeta}</div></div>`+
      `<div class="people" style="grid-template-columns:repeat(${nisaRows.length},1fr)">`+nisaRows.map(r=>card(r,C.nisa,d)).join("")+`</div>`;
    html+=group("gNisa","Nisa Group",C.nisa,C.nisaSoft,inner);
    html+=leftoverBlock("Left Over After Nisa Share",d.leftover,d.total);
  }

  let fgRows=d.rows.filter(r=>r.name==="Father"||r.name==="Grandfather"),
      sonRows=d.rows.filter(r=>r.name.startsWith("Son ")),
      daughterRows=d.rows.filter(r=>r.name.startsWith("Daughter "));

  if(fgRows.length||sonRows.length||daughterRows.length){
    let allFGC=[...fgRows,...sonRows,...daughterRows];
    let inner=summary("Father + Grandfather + Children",allFGC,C.fgc,d.total,d.leftover,true);

    if(fgRows.length){
      inner+=`<div class="people" style="grid-template-columns:repeat(${fgRows.length},1fr)">`+fgRows.map(r=>card(r,C.fgc,d)).join("")+`</div>`;
    }

    if(sonRows.length||daughterRows.length){
      let sonSh=d.total?sum(sonRows)/d.total:0,datSh=d.total?sum(daughterRows)/d.total:0;

      if(sonRows.length&&daughterRows.length){
        inner+=`<div class="childrenGrid"><div class="subgroup" style="--c:${C.son};border-color:${C.son}"><div class="summary" style="background:${C.son};border-radius:0"><div class="title">Sons</div><div class="meta">${frac(sonSh)} = ${pct(sonSh)} of Total • ${money(sum(sonRows))}</div></div><div class="people" style="grid-template-columns:repeat(${sonRows.length},1fr)">`+sonRows.map(r=>card(r,C.son,d)).join("")+`</div></div><div class="subgroup" style="--c:${C.daughter};border-color:${C.daughter}"><div class="summary" style="background:${C.daughter};border-radius:0"><div class="title">Daughters</div><div class="meta">${frac(datSh)} = ${pct(datSh)} of Total • ${money(sum(daughterRows))}</div></div><div class="people" style="grid-template-columns:repeat(${daughterRows.length},1fr)">`+daughterRows.map(r=>card(r,C.daughter,d)).join("")+`</div></div></div>`;
      }else if(sonRows.length){
        inner+=`<div class="subgroup" style="--c:${C.son};border-color:${C.son}"><div class="summary" style="background:${C.son};border-radius:0"><div class="title">Sons</div><div class="meta">${frac(sonSh)} = ${pct(sonSh)} of Total • ${money(sum(sonRows))}</div></div><div class="people" style="grid-template-columns:repeat(${sonRows.length},1fr)">`+sonRows.map(r=>card(r,C.son,d)).join("")+`</div></div>`;
      }else if(daughterRows.length){
        inner+=`<div class="subgroup" style="--c:${C.daughter};border-color:${C.daughter}"><div class="summary" style="background:${C.daughter};border-radius:0"><div class="title">Daughters</div><div class="meta">${frac(datSh)} = ${pct(datSh)} of Total • ${money(sum(daughterRows))}</div></div><div class="people" style="grid-template-columns:repeat(${daughterRows.length},1fr)">`+daughterRows.map(r=>card(r,C.daughter,d)).join("")+`</div></div>`;
      }
    }
    html+=group("gFGC","Father + Grandfather + Children Group",C.fgc,C.fgcSoft,inner);
  }

  let msRows=d.rows.filter(r=>r.name==="Mother"||r.name.startsWith("Brother ")||r.name.startsWith("Sister "));
  if(msRows.length){
    let inner=summary("Mother + Siblings",msRows,C.ms,d.total,d.leftover,true)+`<div class="people" style="grid-template-columns:repeat(${msRows.length},1fr)">`+msRows.map(r=>card(r,C.ms,d)).join("")+`</div>`;
    html+=group("gMS","Mother + Siblings Group",C.ms,C.msSoft,inner);
  }

  $("visual").innerHTML=html||`<div class="empty">No recipients selected.</div>`;
}
function tableFraction(r,d){
  let txt=`${r.frac} of Total`;
  if(isLeftOverPerson(r.name) && d.leftover && Math.abs(d.leftover)>0.01){
    let loShare=r.amt/d.leftover;
    txt+=`<br>${frac(loShare)} of Left Over`;
  }
  return txt;
}
function renderTable(d){$("tbody").innerHTML=d.rows.map(r=>`<tr><td>${r.name}</td><td>${tableFraction(r,d)}</td><td>${pct(r.share)}</td><td>${money(r.amt)}</td><td>${r.note}</td></tr>`).join("");let assigned=d.rows.filter(r=>!r.name.includes("(All)")).reduce((s,r)=>s+r.amt,0);$("totalPct").textContent=d.total?pct(assigned/d.total):"0.00%";$("totalAmt").textContent=money(assigned);let diff=d.total-assigned,st=$("status");if(Math.abs(diff)<0.01){st.style.background="#e8f8e9";st.style.color="#16621c";st.textContent="✓ Shares balance correctly. Total shown: "+(d.total?pct(assigned/d.total):"0.00%")}else if(diff>0.01){st.style.background="#fff3cd";st.style.color="#8a5a00";st.textContent="⚠ WARNING: Unallocated amount remaining: "+money(diff)+" ("+(d.total?pct(diff/d.total):"0.00%")+")"}else{st.style.background="#fde2e2";st.style.color="#b00020";st.textContent="❌ ERROR: Shares exceed Total Amount by "+money(-diff)+" ("+(d.total?pct((-diff)/d.total):"0.00%")+")"}}
function render(){let d=calc();renderVisual(d);renderTable(d)}
function reset(){["total","sex","nisa","wife","husband","father","grandfather","sons","daughters","mother","brothers","sisters"].forEach(()=>{});$("total").value=120000;
$("sex").value="Male";
$("nisa").value=0;
$("wife").value=0;
$("husband").value=0;
$("father").value=0;
$("grandfather").value=0;
$("sons").value=0;
$("daughters").value=0;
$("mother").value=0;
$("brothers").value=0;
$("sisters").value=0;
render()}
document.querySelectorAll("input,select").forEach(e=>e.addEventListener("change",render));$("calcBtn").addEventListener("click",render);$("resetBtn").addEventListener("click",reset);render();
</script>
</body>
</html>
