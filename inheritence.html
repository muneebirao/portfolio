
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inheritance Share Calculator</title>
<style>
:root{
  --navy:#061b49;
  --purple:#8a00e6;
  --orange:#ff9900;
  --green:#238323;
  --son:#0066cc;
  --daughter:#f01878;
  --zauj:#003f9e;
  --bg:#f3f6fb;
  --border:#ffffff;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  font-family:Arial, Helvetica, sans-serif;
  color:#07173d;
}
.app{
  max-width:1280px;
  margin:18px auto;
  display:grid;
  grid-template-columns:310px 1fr;
  gap:18px;
  padding:0 14px;
}
.card{
  background:#fff;
  border:1px solid #dfe5ef;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,.06);
}
.brand{padding:18px}
.brand h1{font-size:25px;line-height:1.1;margin:0 0 8px;color:var(--navy)}
.brand p{margin:0;line-height:1.35;color:#24304f}
.panel{padding:16px;margin-top:14px}
.panel h2,.main h2{font-size:16px;margin:0 0 12px;color:var(--navy);letter-spacing:.2px}
.field{
  display:grid;
  grid-template-columns:1fr 86px;
  align-items:center;
  gap:8px;
  margin:10px 0;
}
label{font-weight:700;font-size:14px}
input,select{
  height:36px;
  border:1px solid #cfd7e5;
  border-radius:8px;
  padding:0 9px;
  font-size:15px;
}
button{
  width:100%;
  margin-top:14px;
  height:42px;
  border:0;
  border-radius:8px;
  background:#075ce6;
  color:white;
  font-weight:800;
  font-size:15px;
  cursor:pointer;
}
.main{padding:14px}
.visual{
  border-radius:8px;
  overflow:hidden;
  border:1px solid #d8dfeb;
}
.group-title{
  min-height:64px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-weight:900;
  text-align:center;
  border-bottom:2px solid var(--border);
  padding:8px 12px;
  font-size:20px;
  line-height:1.25;
}
.group-title .small{font-size:17px;font-weight:800}
.people{
  display:grid;
  min-height:82px;
}
.person{
  color:#fff;
  font-weight:800;
  text-align:center;
  border-right:2px solid var(--border);
  border-bottom:2px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  padding:8px 5px;
  line-height:1.22;
  min-height:76px;
}
.person:last-child{border-right:0}
.person .name{font-size:16px}
.person .line{font-size:14px}
.nisaTitle,.nisaPerson{background:linear-gradient(135deg,#7c00d8,#a900ff)}
.msTitle,.msPerson{background:linear-gradient(135deg,#ef8c00,#ffae00)}
.fgTitle,.fgPerson{background:linear-gradient(135deg,#1d741d,#349934)}
.sonTitle,.sonPerson{background:linear-gradient(135deg,#0059bd,#0878e8)}
.daughterTitle,.daughterPerson{background:linear-gradient(135deg,#dd0f66,#ff318b)}
.zaujTitle{background:linear-gradient(135deg,#003b94,#006ce6);border-bottom:0}
.childrenRow{
  display:grid;
  grid-template-columns:1fr 1fr;
}
.childBlock{border-bottom:2px solid var(--border)}
.childBlock:first-child{border-right:2px solid var(--border)}
.childTitle{
  min-height:64px;
  color:#fff;
  font-weight:900;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  border-bottom:2px solid var(--border);
  font-size:20px;
  line-height:1.25;
}
.tableWrap{margin-top:16px;overflow:auto}
table{width:100%;border-collapse:collapse;background:#fff;font-size:14px}
th{background:var(--navy);color:white;padding:9px;text-align:left}
td{border:1px solid #d9dfeb;padding:8px}
tfoot td{font-weight:900;background:#fff4c7}
.ok{margin-top:12px;background:#e8f8e9;color:#16621c;padding:12px;text-align:center;border-radius:8px;font-weight:900}
@media(max-width:900px){
  .app{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <aside>
    <div class="card brand">
      <h1>Inheritance<br>Share Calculator</h1>
      <p>Readable visual layout with fractions, percentages, and dollar amounts.</p>
    </div>
    <div class="card panel">
      <h2>INPUTS</h2>
      <div class="field"><label>Total Amount ($)</label><input id="total" type="number" value="120000"></div>
      <div class="field"><label>Deceased</label><select id="sex"><option selected>Male</option><option>Female</option></select></div>
      <div class="field"><label>Nisa (0–3)</label><input id="nisa" type="number" min="0" max="3" value="0"></div>
      <div class="field"><label>Wife/Zaujah (0–1)</label><input id="wife" type="number" min="0" max="1" value="1"></div>
      <div class="field"><label>Husband/Zauj (0–1)</label><input id="husband" type="number" min="0" max="1" value="0"></div>
      <div class="field"><label>Father (0–1)</label><input id="father" type="number" min="0" max="1" value="1"></div>
      <div class="field"><label>Grandfather (0–1)</label><input id="grandfather" type="number" min="0" max="1" value="0"></div>
      <div class="field"><label>Sons (0–5)</label><input id="sons" type="number" min="0" max="5" value="0"></div>
      <div class="field"><label>Daughters (0–5)</label><input id="daughters" type="number" min="0" max="5" value="3"></div>
      <div class="field"><label>Mother (0–1)</label><input id="mother" type="number" min="0" max="1" value="1"></div>
      <div class="field"><label>Brothers (0–5)</label><input id="brothers" type="number" min="0" max="5" value="0"></div>
      <div class="field"><label>Sisters (0–5)</label><input id="sisters" type="number" min="0" max="5" value="0"></div>
      <button onclick="render()">CALCULATE</button>
    </div>
  </aside>

  <main class="card main">
    <h2>VISUAL SHARE — fixed readable layout</h2>
    <div id="visual" class="visual"></div>

    <div class="tableWrap">
      <h2>NUMERICAL RESULT</h2>
      <table>
        <thead>
          <tr><th>Category / Person</th><th>Fraction</th><th>% of Total</th><th>Amount ($)</th><th>Note</th></tr>
        </thead>
        <tbody id="tbody"></tbody>
        <tfoot><tr><td>TOTAL</td><td>1/1</td><td id="totalPct"></td><td id="totalAmt"></td><td>Total displayed</td></tr></tfoot>
      </table>
    </div>
    <div class="ok" id="status"></div>
  </main>
</div>

<script>
const $ = id => document.getElementById(id);
const money = n => "$" + Number(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const pct = n => (n*100).toFixed(2)+"%";
const gcd = (a,b)=> b ? gcd(b,a%b) : Math.abs(a);
function fracFromDecimal(x){
  if (Math.abs(x) < 1e-10) return "0";
  const den = 108000; // enough for these rule fractions
  const num = Math.round(x*den);
  const g = gcd(num,den);
  return (num/g)+"/"+(den/g);
}
function val(id){return Math.max(0, parseInt($(id).value || "0",10));}
function clampInputs(){
  const limits = {nisa:3,wife:1,husband:1,father:1,grandfather:1,sons:5,daughters:5,mother:1,brothers:5,sisters:5};
  for(const [id,max] of Object.entries(limits)){
    let v = val(id); if(v>max)v=max; $(id).value=v;
  }
  if(val("wife")>0){$("husband").value=0;}
  if(val("husband")>0){$("wife").value=0;}
}
function calc(){
  clampInputs();
  const total = Number($("total").value || 0);
  const nisa=val("nisa"), wife=val("wife"), husband=val("husband"), father=val("father"), grandfather=val("grandfather");
  const sons=val("sons"), daughters=val("daughters"), mother=val("mother"), brothers=val("brothers"), sisters=val("sisters");
  const hasChildren = sons+daughters>0;
  const hasSiblings = brothers+sisters>0;

  let rows=[];

  let nisaShare=0, nisaFrac="0";
  if(nisa===1){nisaShare=0.5; nisaFrac="1/2";}
  if(nisa===2){nisaShare=0.5; nisaFrac="1/2";}
  if(nisa===3){nisaShare=2/3; nisaFrac="2/3";}
  if(nisa>0){
    rows.push({name:"Nisa (All)", frac:nisaFrac, share:nisaShare, amt:nisaShare*total, note:"Total Nisa share"});
    const each=nisaShare/nisa;
    for(let i=1;i<=nisa;i++) rows.push({name:"Nisa "+i, frac:fracFromDecimal(each), share:each, amt:each*total, note:"Individual Nisa share"});
  }

  let wifeShare = wife ? (hasChildren ? 1/8 : 1/4) : 0;
  let husbandShare = husband ? (hasChildren ? 1/4 : 1/2) : 0;
  const leftover = total - (nisaShare*total + wifeShare*total + husbandShare*total);

  // mother/sibling block share
  let msPool = (mother || hasSiblings) ? leftover/3 : 0;
  let fgChildrenPool = leftover - msPool;

  if(father+grandfather+sons+daughters===0 && msPool>0){
    msPool = leftover;
    fgChildrenPool = 0;
  }
  if(mother+brothers+sisters===0 && fgChildrenPool>0){
    fgChildrenPool = leftover;
    msPool = 0;
  }

  if(mother){
    const mAmt = hasSiblings ? leftover/6 : msPool;
    rows.push({name:"Mother", frac:fracFromDecimal(mAmt/total), share:mAmt/total, amt:mAmt, note:hasSiblings ? "Mother gets 1/6 of LeftOverAmount" : "Mother receives Mother+Siblings portion"});
    const sibPool = msPool - mAmt;
    const sibCount = brothers+sisters;
    if(sibCount>0){
      const each=sibPool/sibCount;
      for(let i=1;i<=brothers;i++) rows.push({name:"Brother "+i, frac:fracFromDecimal(each/total), share:each/total, amt:each, note:"Siblings share equally"});
      for(let i=1;i<=sisters;i++) rows.push({name:"Sister "+i, frac:fracFromDecimal(each/total), share:each/total, amt:each, note:"Siblings share equally"});
    }
  } else if(hasSiblings){
    const each=msPool/(brothers+sisters);
    for(let i=1;i<=brothers;i++) rows.push({name:"Brother "+i, frac:fracFromDecimal(each/total), share:each/total, amt:each, note:"Mother absent; siblings share Mother+Siblings portion"});
    for(let i=1;i<=sisters;i++) rows.push({name:"Sister "+i, frac:fracFromDecimal(each/total), share:each/total, amt:each, note:"Mother absent; siblings share Mother+Siblings portion"});
  }

  let parentFixed = 0;
  if(hasChildren){
    if(father){const a=leftover/6; parentFixed+=a; rows.push({name:"Father", frac:fracFromDecimal(a/total), share:a/total, amt:a, note:"Child present → 1/6 of LeftOverAmount"});}
    if(grandfather){const a=leftover/6; parentFixed+=a; rows.push({name:"Grandfather", frac:fracFromDecimal(a/total), share:a/total, amt:a, note:"Child present → 1/6 of LeftOverAmount"});}
    let childPool = Math.max(0, fgChildrenPool - parentFixed);
    const units = sons*2 + daughters;
    if(units>0){
      const unit = childPool/units;
      for(let i=1;i<=sons;i++) rows.push({name:"Son "+i, frac:fracFromDecimal((unit*2)/total), share:(unit*2)/total, amt:unit*2, note:"Son share = 2 × daughter share"});
      for(let i=1;i<=daughters;i++) rows.push({name:"Daughter "+i, frac:fracFromDecimal(unit/total), share:unit/total, amt:unit, note:"Daughter share"});
    }
  } else {
    const count=father+grandfather;
    if(count>0){
      const each=fgChildrenPool/count;
      if(father) rows.push({name:"Father", frac:fracFromDecimal(each/total), share:each/total, amt:each, note:"No children; shares Father+Grandfather portion"});
      if(grandfather) rows.push({name:"Grandfather", frac:fracFromDecimal(each/total), share:each/total, amt:each, note:"No children; shares Father+Grandfather portion"});
    }
  }

  if(wife) rows.push({name:"Wife (Zaujah)", frac:fracFromDecimal(wifeShare), share:wifeShare, amt:wifeShare*total, note:hasChildren ? "Children present → 1/8" : "No children → 1/4"});
  if(husband) rows.push({name:"Husband (Zauj)", frac:fracFromDecimal(husbandShare), share:husbandShare, amt:husbandShare*total, note:hasChildren ? "Children present → 1/4" : "No children → 1/2"});

  return {total, rows, nisa, wife, husband, father, grandfather, sons, daughters, mother, brothers, sisters, nisaShare, leftover, msPool, fgChildrenPool};
}
function rowHtml(title, frac, share, amount, cls){
  return `<div class="group-title ${cls}"><div>${title}</div><div class="small">${frac} = ${pct(share)} • ${money(amount)}</div></div>`;
}
function personHtml(name, frac, share, amt, cls){
  return `<div class="person ${cls}"><div class="name">${name}</div><div class="line">${frac} = ${pct(share)}</div><div class="line">${money(amt)}</div></div>`;
}
function render(){
  const d=calc();
  const find = name => d.rows.find(r=>r.name===name);
  let html="";

  if(d.nisa>0){
    html += rowHtml("Nisa", d.rows[0].frac, d.rows[0].share, d.rows[0].amt, "nisaTitle");
    html += `<div class="people nisaPeople" style="grid-template-columns:repeat(${d.nisa},1fr)">`;
    for(let i=1;i<=d.nisa;i++){ const r=find("Nisa "+i); html+=personHtml(r.name,r.frac,r.share,r.amt,"nisaPerson"); }
    html += `</div>`;
  }

  const msRows = d.rows.filter(r => r.name==="Mother" || r.name.startsWith("Brother ") || r.name.startsWith("Sister "));
  if(msRows.length){
    const msAmt = msRows.reduce((s,r)=>s+r.amt,0), msShare=msAmt/d.total;
    html += rowHtml("Mother + Siblings", fracFromDecimal(msShare), msShare, msAmt, "msTitle");
    html += `<div class="people msPeople" style="grid-template-columns:repeat(${msRows.length},1fr)">`;
    msRows.forEach(r=> html+=personHtml(r.name,r.frac,r.share,r.amt,"msPerson"));
    html += `</div>`;
  }

  const fgRows = d.rows.filter(r => r.name==="Father" || r.name==="Grandfather");
  if(fgRows.length){
    const fgAmt = fgRows.reduce((s,r)=>s+r.amt,0), fgShare=fgAmt/d.total;
    html += rowHtml("Father + Grandfather", fracFromDecimal(fgShare), fgShare, fgAmt, "fgTitle");
    html += `<div class="people fgPeople" style="grid-template-columns:repeat(${fgRows.length},1fr)">`;
    fgRows.forEach(r=> html+=personHtml(r.name,r.frac,r.share,r.amt,"fgPerson"));
    html += `</div>`;
  }

  const sonRows = d.rows.filter(r=>r.name.startsWith("Son "));
  const daughterRows = d.rows.filter(r=>r.name.startsWith("Daughter "));
  if(sonRows.length || daughterRows.length){
    html += `<div class="childrenRow">`;
    html += `<div class="childBlock">`;
    const sa = sonRows.reduce((s,r)=>s+r.amt,0), ss=d.total?sa/d.total:0;
    html += `<div class="childTitle sonTitle"><div>Sons</div><div class="small">${fracFromDecimal(ss)} = ${pct(ss)} • ${money(sa)}</div></div>`;
    html += `<div class="people sonsPeople" style="grid-template-columns:repeat(${Math.max(sonRows.length,1)},1fr)">`;
    if(sonRows.length) sonRows.forEach(r=>html+=personHtml(r.name,r.frac,r.share,r.amt,"sonPerson"));
    else html += `<div class="person sonPerson"><div class="name">No Sons</div><div class="line">0</div></div>`;
    html += `</div></div>`;

    html += `<div class="childBlock">`;
    const da = daughterRows.reduce((s,r)=>s+r.amt,0), ds=d.total?da/d.total:0;
    html += `<div class="childTitle daughterTitle"><div>Daughters</div><div class="small">${fracFromDecimal(ds)} = ${pct(ds)} • ${money(da)}</div></div>`;
    html += `<div class="people daughtersPeople" style="grid-template-columns:repeat(${Math.max(daughterRows.length,1)},1fr)">`;
    if(daughterRows.length) daughterRows.forEach(r=>html+=personHtml(r.name,r.frac,r.share,r.amt,"daughterPerson"));
    else html += `<div class="person daughterPerson"><div class="name">No Daughters</div><div class="line">0</div></div>`;
    html += `</div></div></div>`;
  }

  const z = d.rows.find(r=>r.name.includes("Zauj"));
  if(z) html += rowHtml(z.name, z.frac, z.share, z.amt, "zaujTitle");

  $("visual").innerHTML = html;

  $("tbody").innerHTML = d.rows.map(r=>`<tr><td>${r.name}</td><td>${r.frac}</td><td>${pct(r.share)}</td><td>${money(r.amt)}</td><td>${r.note}</td></tr>`).join("");
  const sum = d.rows.filter(r=>!r.name.includes("(All)")).reduce((s,r)=>s+r.amt,0);
  $("totalPct").textContent = pct(sum/d.total);
  $("totalAmt").textContent = money(sum);
  $("status").textContent = "Total shown: " + pct(sum/d.total) + " of Total Amount";
}
document.querySelectorAll("input,select").forEach(el=>el.addEventListener("change",render));
render();
</script>
</body>
</html>
